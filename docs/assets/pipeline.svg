<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="Discovery to client plugin pipeline">
  <defs>
    <linearGradient id="gate-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gate-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="card-shadow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="flow-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="400" rx="16" fill="#f8fafc"/>

  <text x="480" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Pipeline: gates, build loop, validate</text>
  <text x="480" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">~1 h to MVP (pilot skill + validating-claims) | phase 2 when RAG/data is ready</text>

  <!-- Row 1: main flow -->
  <g filter="url(#card-shadow)">
    <rect x="24" y="88" width="130" height="72" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="89" y="118" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Raw notes</text>
    <text x="89" y="140" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94a3b8">discovery/raw/</text>
  </g>

  <line x1="154" y1="124" x2="182" y2="124" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <g filter="url(#card-shadow)">
    <rect x="190" y="88" width="150" height="72" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="265" y="114" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#4338ca">Parse discovery</text>
    <text x="265" y="134" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#6366f1">super-parse-discovery</text>
    <text x="265" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">intake | process-map | skill-map</text>
  </g>

  <line x1="340" y1="124" x2="368" y2="124" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <!-- Gate A -->
  <g filter="url(#card-shadow)">
    <rect x="376" y="80" width="148" height="88" rx="12" fill="#fff" stroke="#6ee7b7" stroke-width="2"/>
    <rect x="376" y="80" width="148" height="28" rx="12" fill="url(#gate-a)"/>
    <rect x="376" y="96" width="148" height="12" fill="url(#gate-a)"/>
    <text x="450" y="100" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">Gate A</text>
    <text x="450" y="128" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#065f46">Review skill-map.yaml</text>
    <text x="450" y="148" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#059669">OK skill-map</text>
  </g>

  <line x1="524" y1="124" x2="552" y2="124" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <g filter="url(#card-shadow)">
    <rect x="560" y="88" width="150" height="72" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="635" y="114" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Bootstrap</text>
    <text x="635" y="134" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">new-client-plugin.sh</text>
    <text x="635" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">scaffold plugin shell</text>
  </g>

  <line x1="710" y1="124" x2="738" y2="124" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <g filter="url(#card-shadow)">
    <rect x="746" y="88" width="190" height="72" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="841" y="114" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#4338ca">Build next skill</text>
    <text x="841" y="134" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#6366f1">super-build-client-plugin</text>
    <text x="841" y="150" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">one skill at a time</text>
  </g>

  <!-- Loop arrow down from build -->
  <path d="M841 168 L841 210 L450 210 L450 176" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#flow-arrow)"/>
  <text x="645" y="202" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">repeat until phase 1 complete</text>

  <!-- Row 2: Gate B + outputs -->
  <g filter="url(#card-shadow)">
    <rect x="376" y="228" width="148" height="88" rx="12" fill="#fff" stroke="#fcd34d" stroke-width="2"/>
    <rect x="376" y="228" width="148" height="28" rx="12" fill="url(#gate-b)"/>
    <rect x="376" y="244" width="148" height="12" fill="url(#gate-b)"/>
    <text x="450" y="248" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">Gate B</text>
    <text x="450" y="276" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#92400e">Review each SKILL.md</text>
    <text x="450" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#d97706">OK skill &lt;name&gt;</text>
  </g>

  <line x1="524" y1="272" x2="560" y2="272" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <g filter="url(#card-shadow)">
    <rect x="568" y="236" width="168" height="72" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="652" y="264" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Validate</text>
    <text x="652" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">validate-client-plugin.sh</text>
    <text x="652" y="300" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">structure + skill-map</text>
  </g>

  <line x1="736" y1="272" x2="772" y2="272" stroke="#94a3b8" stroke-width="2" marker-end="url(#flow-arrow)"/>

  <g filter="url(#card-shadow)">
    <rect x="780" y="236" width="156" height="72" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="858" y="264" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0e7490">Install &amp; use</text>
    <text x="858" y="284" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#0891b2">--plugin-dir clients/...</text>
    <text x="858" y="300" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">client-specific agent</text>
  </g>

  <!-- Left column: artifacts -->
  <g filter="url(#card-shadow)">
    <rect x="24" y="228" width="316" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="182" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Artifacts in client workspace</text>
    <text x="44" y="284" font-family="ui-monospace, monospace" font-size="11" fill="#475569">clients/&lt;slug&gt;/discovery/intake.md</text>
    <text x="44" y="306" font-family="ui-monospace, monospace" font-size="11" fill="#475569">clients/&lt;slug&gt;/discovery/process-map.md</text>
    <text x="44" y="328" font-family="ui-monospace, monospace" font-size="11" fill="#475569">clients/&lt;slug&gt;/discovery/skill-map.yaml</text>
    <text x="44" y="350" font-family="ui-monospace, monospace" font-size="11" fill="#475569">clients/&lt;slug&gt;/&lt;plugin&gt;/skills/*/SKILL.md</text>
  </g>

  <!-- Legend -->
  <rect x="24" y="376" width="12" height="12" rx="3" fill="url(#gate-a)"/>
  <text x="44" y="386" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Human approval gate</text>
  <rect x="180" y="376" width="12" height="12" rx="3" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="200" y="386" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Agent skill invocation</text>
  <rect x="360" y="376" width="12" height="12" rx="3" fill="#fff" stroke="#e2e8f0"/>
  <text x="380" y="386" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Script / scaffold step</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="plugin-factory repository layout">
  <defs>
    <linearGradient id="root-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="soft-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="880" height="420" rx="16" fill="#f8fafc"/>

  <text x="440" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0f172a">What lives where</text>
  <text x="440" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">This repo is the factory | client plugins are generated in your workspace</text>

  <!-- Factory box -->
  <g filter="url(#soft-shadow)">
    <rect x="40" y="84" width="380" height="300" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="40" y="84" width="380" height="48" rx="16" fill="url(#root-grad)"/>
    <rect x="40" y="116" width="380" height="16" fill="url(#root-grad)"/>
    <text x="230" y="116" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">plugin-factory repo</text>
    <text x="230" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">install once | reuse for every client</text>

    <!-- tree items -->
    <circle cx="68" cy="168" r="4" fill="#6366f1"/>
    <text x="82" y="172" font-family="ui-monospace, monospace" font-size="12" fill="#334155">skills/</text>
    <text x="140" y="172" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">3 superskills</text>

    <circle cx="68" cy="198" r="4" fill="#6366f1"/>
    <text x="82" y="202" font-family="ui-monospace, monospace" font-size="12" fill="#334155">references/catalog/base/</text>
    <text x="290" y="202" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">9 blueprints</text>

    <circle cx="68" cy="228" r="4" fill="#6366f1"/>
    <text x="82" y="232" font-family="ui-monospace, monospace" font-size="12" fill="#334155">references/pipeline/</text>
    <text x="250" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">schema + runbook</text>

    <circle cx="68" cy="258" r="4" fill="#6366f1"/>
    <text x="82" y="262" font-family="ui-monospace, monospace" font-size="12" fill="#334155">references/templates/</text>
    <text x="255" y="262" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">SKILL + client pack</text>

    <circle cx="68" cy="288" r="4" fill="#6366f1"/>
    <text x="82" y="292" font-family="ui-monospace, monospace" font-size="12" fill="#334155">scripts/</text>
    <text x="145" y="292" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">scaffold | validate | sync</text>

    <rect x="60" y="312" width="340" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="76" y="334" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Manifests (same content, 3 hosts)</text>
    <text x="76" y="354" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">.claude-plugin/ | .cursor-plugin/ | .agents/plugins/</text>
  </g>

  <!-- Arrow -->
  <path d="M440 234 L500 234" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="470" y="220" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">generates</text>

  <!-- Client workspace box -->
  <g filter="url(#soft-shadow)">
    <rect x="512" y="84" width="328" height="300" rx="16" fill="#ffffff" stroke="#7dd3fc" stroke-width="2"/>
    <rect x="512" y="84" width="328" height="48" rx="16" fill="#0ea5e9"/>
    <rect x="512" y="116" width="328" height="16" fill="#0ea5e9"/>
    <text x="676" y="116" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Your client workspace</text>
    <text x="676" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">separate repo or folder | not committed here</text>

    <rect x="532" y="156" width="288" height="108" rx="10" fill="#f0f9ff" stroke="#bae6fd"/>
    <text x="548" y="178" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#0369a1">clients/acme-corp/</text>
    <text x="564" y="200" font-family="ui-monospace, monospace" font-size="11" fill="#475569">discovery/intake.md</text>
    <text x="564" y="220" font-family="ui-monospace, monospace" font-size="11" fill="#475569">discovery/process-map.md</text>
    <text x="564" y="240" font-family="ui-monospace, monospace" font-size="11" fill="#475569">discovery/skill-map.yaml</text>
    <text x="564" y="260" font-family="ui-monospace, monospace" font-size="11" fill="#475569">acme-agent/skills/.../SKILL.md</text>

    <rect x="532" y="280" width="288" height="88" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="548" y="302" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0e7490">Install target</text>
    <text x="548" y="324" font-family="ui-monospace, monospace" font-size="10" fill="#475569">claude --plugin-dir ./clients/acme-corp/acme-agent</text>
    <text x="548" y="346" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">Tailored plugin for one client only</text>
  </g>

  <!-- Bottom note -->
  <rect x="40" y="396" width="800" height="1" fill="#e2e8f0"/>
  <text x="440" y="412" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#94a3b8">After editing skills/ or references/, run ./scripts/sync-codex-plugin.sh before commit</text>
</svg>
